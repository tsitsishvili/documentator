name: tests

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Composer validate
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Validate release changelog entry
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          version="${GITHUB_REF_NAME#v}"
          grep -Fq "## [$version]" CHANGELOG.md

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - {framework: 'Laravel 12', testbench: '^10.0', php: '8.2', dependencies: prefer-lowest}
          - {framework: 'Laravel 12', testbench: '^10.0', php: '8.2', dependencies: prefer-stable}
          - {framework: 'Laravel 12', testbench: '^10.0', php: '8.3', dependencies: prefer-stable}
          - {framework: 'Laravel 12', testbench: '^10.0', php: '8.4', dependencies: prefer-stable}
          - {framework: 'Laravel 12', testbench: '^10.0', php: '8.5', dependencies: prefer-stable}
          - {framework: 'Laravel 13', testbench: '^11.0', php: '8.3', dependencies: prefer-lowest}
          - {framework: 'Laravel 13', testbench: '^11.0', php: '8.3', dependencies: prefer-stable}
          - {framework: 'Laravel 13', testbench: '^11.0', php: '8.4', dependencies: prefer-stable}
          - {framework: 'Laravel 13', testbench: '^11.0', php: '8.5', dependencies: prefer-stable}
    name: ${{ matrix.framework }} / PHP ${{ matrix.php }} / ${{ matrix.dependencies }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: |
          composer require --dev "orchestra/testbench:${{ matrix.testbench }}" --no-update --no-interaction
          composer update --${{ matrix.dependencies }} --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/pest

  lint:
    runs-on: ubuntu-latest
    name: Pint
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup PHP
        uses: shivammathur/setup-php@b604ade2a87db23f8871b7182e69ec5e75effb45 # v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Check code style
        run: vendor/bin/pint --test

  browser:
    runs-on: ubuntu-latest
    name: Browser UI
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        run: npm run test:browser
